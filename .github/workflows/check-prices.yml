name: Model price review reminder

# Official OpenAI/Anthropic pricing has no machine-readable feed, so prices are kept in
# pricing/model_prices.json and refreshed by a reviewed edit (never a fragile HTML scrape that
# could record wrong numbers). The app fetches that file at runtime, so an update auto-propagates;
# models the app sees but that are missing here render as "unpriced" until added. This job just
# opens a monthly reminder to re-check the official pages.

on:
  schedule:
    - cron: '0 6 1 * *' # 1st of each month, 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const month = new Date().toISOString().slice(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Monthly: verify model prices (${month})`,
              body: [
                "Verify `pricing/model_prices.json` (USD per 1,000,000 tokens) against the official pages:",
                "",
                "- OpenAI: https://developers.openai.com/api/docs/pricing",
                "- Anthropic: https://platform.claude.com/docs/en/about-claude/pricing",
                "",
                "The app fetches this file at runtime, so any update here propagates automatically.",
                "A model the app sees but that is missing here shows as \"unpriced\" until added."
              ].join("\n")
            });
