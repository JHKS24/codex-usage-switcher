name: check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build (warnings as errors)
        run: dotnet build windows/CodexUsageSwitcher.Windows/CodexUsageSwitcher.Windows.csproj -c Release -warnaserror
      - name: Unit tests
        run: dotnet test windows/CodexUsageSwitcher.Windows.Tests/CodexUsageSwitcher.Windows.Tests.csproj -c Release
      - name: Publish single-file self-contained exe
        shell: pwsh
        run: ./build-windows.ps1
